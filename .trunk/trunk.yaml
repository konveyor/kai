# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.6
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.6.3
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.25.0
    - node@18.12.1
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  definitions:
    - name: bandit
      direct_configs: [bandit.yaml]
      commands:
        - name: lint
          run: bandit --exit-zero -c bandit.yaml --format json --output ${tmpfile} ${target}
  disabled:
    # - cspell@8.17.3
    - cspell
  enabled:
    - gofmt@1.20.4
    - golangci-lint@1.64.8
    - actionlint@1.7.12
    - taplo@0.10.0
    - bandit@1.9.4
    - black@26.3.1
    - checkov@3.2.521
    - git-diff-check
    - isort@8.0.1
    - markdownlint@0.48.0
    - osv-scanner@2.3.5
    - oxipng@10.1.0
    - prettier@3.8.3
    - ruff@0.15.10
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - svgo@4.0.1
    - trivy@0.69.3
    - trufflehog@3.94.3
    - yamllint@1.38.0
  ignore:
    - linters: [ALL]
      paths:
        # Complaining about intentionally empty values
        - .github/workflows/**
        #  Weird recursive cspell thing doesn't check this file properly
        - .trunk/configs/custom-words.txt
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
